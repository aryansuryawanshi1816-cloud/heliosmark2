<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helios — AI Assistant</title>
  <meta name="theme-color" content="#000000" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />

  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.09);
      --border-strong: rgba(255,255,255,0.15);
      --text: #f2f2f7;
      --text-secondary: rgba(242,242,247,0.5);
      --text-tertiary: rgba(242,242,247,0.3);
      --accent: #D4920A;
      --accent-soft: rgba(212,146,10,0.15);
      --accent-glow: rgba(212,146,10,0.22);
      --user-bubble: rgba(212,146,10,0.14);
      --ai-bubble: rgba(255,255,255,0.05);
      --danger: #ff453a;
      --success: #30d158;
      --radius: 18px;
      --radius-sm: 12px;
      --radius-xs: 8px;
      --font-display: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --sidebar-w: 260px;
      --header-h: 56px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    /* ── SURYA LOGO ANIMATIONS ────────────────────────────────── */
    @keyframes suryaRotate  { to { transform: rotate(360deg); } }
    @keyframes suryaReverse { to { transform: rotate(-360deg); } }
    @keyframes suryaPulse   { 0%,100%{transform:scale(1);} 50%{transform:scale(1.06);} }
    @keyframes suryaGlow    { 0%,100%{opacity:0.18;} 50%{opacity:0.32;} }
    @keyframes suryaShimmer { 0%,100%{opacity:0.18;} 50%{opacity:0.35;} }

    .surya-logo-svg .s-rays-card { transform-origin:50% 50%; animation:suryaRotate 12s linear infinite; }
    .surya-logo-svg .s-rays-diag { transform-origin:50% 50%; animation:suryaRotate 16s linear infinite; opacity:0.75; }
    .surya-logo-svg .s-ring      { transform-origin:50% 50%; animation:suryaReverse 20s linear infinite; }
    .surya-logo-svg .s-core      { transform-origin:50% 50%; animation:suryaPulse 3.5s ease-in-out infinite; }
    .surya-logo-svg .s-glow      { transform-origin:50% 50%; animation:suryaGlow 3.5s ease-in-out infinite; }
    .surya-logo-svg .s-shine     { animation:suryaShimmer 3.5s ease-in-out infinite; }

    /* ── GRAIN OVERLAY ─────────────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* ── LOGIN SCREEN ──────────────────────────────────────────── */
    #login-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 100;
      gap: 0;
      animation: fadeIn 0.6s ease;
    }

    #login-screen.hidden { display: none; }

    .login-glow {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(10,132,255,0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .login-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
      padding: 56px 48px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 28px;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      width: 380px;
      position: relative;
      z-index: 1;
    }

    .login-logo {
      width: 88px;
      height: 88px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-title {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.5px;
      text-align: center;
    }

    .login-subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      text-align: center;
      margin-top: -20px;
      line-height: 1.6;
    }

    .google-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      background: var(--text);
      color: #1a1a1a;
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      width: 100%;
      justify-content: center;
      transition: opacity 0.15s, transform 0.15s;
    }

    .google-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .google-btn:active { transform: translateY(0); }

    .google-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

    .login-divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
      color: var(--text-tertiary);
      font-size: 12px;
    }

    .login-divider::before, .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .skip-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      padding: 12px 24px;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 14px;
      cursor: pointer;
      width: 100%;
      transition: all 0.15s;
    }

    .skip-btn:hover { background: var(--surface); color: var(--text); }


    /* ── COLLAPSE GLOW ─────────────────────────────────────────── */
    @keyframes collapseGlow {
      0%,100% { opacity: 0.5; transform: scale(1); }
      50%      { opacity: 1;   transform: scale(1.15); }
    }
    .collapse-glow-ring {
      position: absolute;
      inset: -3px;
      border-radius: 13px;
      border: 1.5px solid rgba(245,200,66,0.45);
      animation: collapseGlow 2.5s ease-in-out infinite;
      pointer-events: none;
    }
    #collapse-btn:hover {
      background: rgba(245,200,66,0.14) !important;
      border-color: rgba(245,200,66,0.5) !important;
    }
    #sidebar.collapsed #collapse-btn .collapse-arrow {
      transform: rotate(180deg);
    }

    /* ── SIDEBAR COLLAPSE ──────────────────────────────────────── */
    #sidebar {
      transition: width 0.3s cubic-bezier(0.4,0,0.2,1), transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }
    #sidebar.collapsed {
      width: 0 !important;
      overflow: hidden;
    }
    .collapse-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: none;
      border: none;
      border-top: 1px solid var(--border);
      color: var(--text-tertiary);
      font-family: var(--font-body);
      font-size: 12px;
      cursor: pointer;
      width: 100%;
      transition: color 0.15s, background 0.15s;
      flex-shrink: 0;
      letter-spacing: 0.3px;
    }
    .collapse-btn:hover { background: var(--surface); color: var(--text-secondary); }
    .collapse-btn svg { transition: transform 0.3s; }
    #sidebar.collapsed .collapse-btn svg { transform: rotate(180deg); }
    .expand-fab {
      position: fixed;
      left: 12px;
      top: 14px;
      z-index: 300;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      color: var(--text-secondary);
      font-size: 12px;
      font-family: var(--font-body);
      cursor: pointer;
      display: none;
      align-items: center;
      gap: 6px;
      transition: all 0.15s;
      backdrop-filter: blur(20px);
    }
    .expand-fab:hover { background: var(--surface-hover); color: var(--text); }
    .expand-fab.visible { display: flex; }

    /* ── APP SHELL ─────────────────────────────────────────────── */
    #app {
      display: flex;
      height: 100vh;
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    #app.visible { opacity: 1; }

    /* ── SIDEBAR ───────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      height: 100vh;
      background: rgba(255,255,255,0.025);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    .sidebar-header {
      height: var(--header-h);
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sidebar-logo {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .sidebar-title {
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.2px;
    }

    .new-chat-btn {
      margin: 12px;
      padding: 11px 16px;
      background: var(--accent-soft);
      border: 1px solid rgba(10,132,255,0.2);
      color: var(--accent);
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s;
    }

    .new-chat-btn:hover { background: rgba(10,132,255,0.22); }

    .sidebar-section {
      padding: 8px 12px 4px;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-tertiary);
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .chat-history {
      flex: 1;
      overflow-y: auto;
      padding: 4px 8px;
      scrollbar-width: none;
    }

    .chat-history::-webkit-scrollbar { display: none; }

    .history-item {
      padding: 10px 12px;
      border-radius: var(--radius-xs);
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: all 0.12s;
      margin-bottom: 2px;
    }

    .history-item:hover { background: var(--surface); color: var(--text); }
    .history-item.active { background: var(--accent-soft); color: var(--accent); }

    .sidebar-footer {
      padding: 12px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── PROFILE CARD ──────────────────────────────────────────── */
    .profile-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }

    .profile-card:hover { background: var(--surface); }

    .profile-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #0a84ff, #5e5ce6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      overflow: hidden;
      flex-shrink: 0;
    }

    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .profile-info { flex: 1; min-width: 0; }

    .profile-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .profile-email {
      font-size: 11px;
      color: var(--text-tertiary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .profile-chevron {
      color: var(--text-tertiary);
      font-size: 12px;
    }

    /* ── PROFILE DROPDOWN ──────────────────────────────────────── */
    .profile-dropdown {
      position: absolute;
      bottom: 100%;
      left: 0;
      right: 0;
      margin: 0 12px 6px;
      background: rgba(28,28,30,0.95);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-sm);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      overflow: hidden;
      display: none;
      z-index: 50;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .profile-dropdown.open { display: block; animation: slideUp 0.15s ease; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      font-size: 14px;
      color: var(--text);
      cursor: pointer;
      transition: background 0.1s;
    }

    .dropdown-item:hover { background: var(--surface-hover); }
    .dropdown-item.danger { color: var(--danger); }
    .dropdown-item svg { opacity: 0.6; }

    .dropdown-divider { height: 1px; background: var(--border); }

    /* ── MAIN CHAT ─────────────────────────────────────────────── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      position: relative;
    }

    /* ── HEADER ────────────────────────────────────────────────── */
    #header {
      height: var(--header-h);
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(10,10,10,0.6);
      position: relative;
      z-index: 10;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }

    .menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
    }

    .model-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 5px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: default;
    }

    .model-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-right { display: flex; align-items: center; gap: 8px; }

    .icon-btn {
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 8px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      transition: all 0.15s;
    }

    .icon-btn:hover { background: var(--surface); color: var(--text); }

    /* ── MESSAGES ──────────────────────────────────────────────── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.1) transparent;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

    /* ── EMPTY STATE ───────────────────────────────────────────── */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 24px;
      padding: 40px;
      animation: fadeIn 0.5s ease;
    }

    #empty-state.hidden { display: none; }

    .empty-logo {
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-greeting {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 400;
      color: var(--text);
      letter-spacing: -0.5px;
      text-align: center;
    }

    .empty-greeting span { color: var(--accent); }

    .suggestions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
      max-width: 480px;
    }

    .suggestion-chip {
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--text-secondary);
      cursor: pointer;
      text-align: left;
      transition: all 0.15s;
      font-family: var(--font-body);
      line-height: 1.4;
      width: 100%;
    }

    .suggestion-chip:hover {
      background: var(--surface-hover);
      border-color: var(--border-strong);
      color: var(--text);
      transform: translateY(-1px);
    }

    /* ── MESSAGE BUBBLES ───────────────────────────────────────── */
    .message-wrapper {
      padding: 6px 24px;
      max-width: 800px;
      margin: 0 auto;
      width: 100%;
      animation: fadeInUp 0.25s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .message-row {
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }

    .message-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      overflow: hidden;
    }

    .msg-avatar.ai {
      background: transparent;
      font-size: 14px;
    }

    .msg-avatar.user {
      background: var(--surface);
      border: 1px solid var(--border);
    }

    .msg-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.6;
      word-break: break-word;
    }

    .bubble.user {
      background: var(--user-bubble);
      border: 1px solid rgba(10,132,255,0.25);
      border-bottom-right-radius: 6px;
      color: var(--text);
    }

    .bubble.ai {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 6px;
      color: var(--text);
    }

    .bubble.error {
      background: rgba(255,69,58,0.1);
      border-color: rgba(255,69,58,0.2);
      color: #ff6961;
    }

    .bubble img.attached-img {
      max-width: 100%;
      border-radius: 10px;
      margin-bottom: 8px;
      display: block;
    }

    /* ── MODEL TAG ─────────────────────────────────────────────── */
    .model-tag {
      font-size: 10px;
      color: var(--text-tertiary);
      margin-top: 4px;
      padding-left: 4px;
    }

    /* ── TYPING INDICATOR ──────────────────────────────────────── */
    .typing-indicator {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 14px 16px;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-tertiary);
      animation: typingBounce 1.2s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-5px); opacity: 1; }
    }

    /* ── INPUT AREA ────────────────────────────────────────────── */
    #input-area {
      padding: 16px 24px 20px;
      flex-shrink: 0;
    }

    /* ── ATTACHMENT PREVIEW ────────────────────────────────────── */
    #attachment-preview {
      display: none;
      margin-bottom: 10px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    #attachment-preview.visible { display: flex; align-items: center; gap: 10px; }

    .attachment-thumb {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
    }

    .attachment-info { flex: 1; min-width: 0; }
    .attachment-name { font-size: 13px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .attachment-size { font-size: 11px; color: var(--text-tertiary); }

    .remove-attachment {
      background: none;
      border: none;
      color: var(--text-tertiary);
      cursor: pointer;
      padding: 4px;
      border-radius: 6px;
      display: flex;
      transition: color 0.1s;
    }

    .remove-attachment:hover { color: var(--danger); }

    /* ── INPUT BOX ─────────────────────────────────────────────── */
    .input-box {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 10px 10px 10px 16px;
      max-width: 800px;
      margin: 0 auto;
      transition: border-color 0.2s;
    }

    .input-box:focus-within {
      border-color: var(--border-strong);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    #message-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.5;
      resize: none;
      max-height: 160px;
      min-height: 24px;
      padding: 2px 0;
    }

    #message-input::placeholder { color: var(--text-tertiary); }

    .input-actions {
      display: flex;
      align-items: center;
      gap: 4px;
      flex-shrink: 0;
    }

    .attach-btn, .send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .attach-btn {
      background: none;
      color: var(--text-tertiary);
    }

    .attach-btn:hover { background: var(--surface); color: var(--text); }

    .send-btn {
      background: var(--accent);
      color: white;
    }

    .send-btn:hover { background: #0070d8; transform: scale(1.05); }
    .send-btn:active { transform: scale(0.95); }
    .send-btn:disabled { background: var(--surface); color: var(--text-tertiary); transform: none; cursor: default; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-tertiary);
      margin-top: 8px;
      max-width: 800px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ── MOBILE ────────────────────────────────────────────────── */
    @media (max-width: 768px) {
      :root { --sidebar-w: 280px; }

      #sidebar {
        position: fixed;
        left: 0;
        top: 0;
        z-index: 200;
        transform: translateX(-100%);
      }

      #sidebar.open { transform: translateX(0); }

      .menu-btn { display: flex; }

      .overlay {
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 199;
        display: none;
      }

      .overlay.visible { display: block; }

      .suggestions { flex-direction: column; }
      .bubble { max-width: 88%; }
      .message-wrapper { padding: 6px 16px; }
      #input-area { padding: 12px 16px 16px; }
    }


        /* ── SKELETON LOADER ───────────────────────────────────────── */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton-bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-bottom-left-radius: 6px;
      padding: 12px 16px;
      width: 220px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .skeleton-line {
      height: 11px;
      border-radius: 6px;
      background: linear-gradient(90deg,
        rgba(255,255,255,0.05) 0%,
        rgba(255,255,255,0.13) 50%,
        rgba(255,255,255,0.05) 100%
      );
      background-size: 400px 100%;
      animation: shimmer 1.3s ease-in-out infinite;
    }
    .skeleton-line:nth-child(2) { animation-delay: 0.1s; }
    .skeleton-line:nth-child(3) { animation-delay: 0.2s; }
    .skeleton-line:nth-child(4) { animation-delay: 0.3s; }
    .skeleton-line.w-90 { width: 90%; }
    .skeleton-line.w-80 { width: 75%; }
    .skeleton-line.w-60 { width: 55%; }
    .skeleton-line.w-40 { width: 38%; }

    /* ── MARKDOWN-LIKE FORMATTING ──────────────────────────────── */
    .bubble code {
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 13px;
      background: rgba(255,255,255,0.08);
      padding: 2px 6px;
      border-radius: 5px;
    }

    .bubble pre {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: var(--radius-xs);
      padding: 14px;
      overflow-x: auto;
      margin: 8px 0;
      font-family: 'SF Mono', 'Menlo', monospace;
      font-size: 13px;
      line-height: 1.5;
    }

    .bubble pre code { background: none; padding: 0; }

    .bubble strong { font-weight: 600; }
    .bubble em { font-style: italic; color: var(--text-secondary); }

    .bubble ul, .bubble ol {

      margin: 6px 0;
    }

    .bubble p { margin: 6px 0; }
    .bubble p:first-child { margin-top: 0; }
    .bubble p:last-child { margin-bottom: 0; }

// ── GOOGLE AUTH ────────────────────────────────────────────────────
function initGoogleAuth() {
  if (typeof google === 'undefined') return; // GSI not loaded (file://) — button still clickable
  google.accounts.id.initialize({
    client_id: GOOGLE_CLIENT_ID,
    callback: handleGoogleCredential,
    auto_select: false
  });
}

function handleGoogleCredential(response) {
  const payload = parseJwt(response.credential);
  user = {
    name: payload.name,
    email: payload.email,
    picture: payload.picture,
    givenName: payload.given_name
  };
  localStorage.setItem('helios_user', JSON.stringify(user));
  enterApp();
}

function parseJwt(token) {
  const base64Url = token.split('.')[1];
  const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
  return JSON.parse(atob(base64));
}

document.getElementById('google-signin-btn').addEventListener('click', () => {
  if (GOOGLE_CLIENT_ID === 'YOUR_GOOGLE_CLIENT_ID') {
    enterApp();
    return;
  }
  if (typeof google === 'undefined') {
    alert('Google Sign-In requires the app to be served over http/https, not file://. Run: npx serve . and open http://localhost:3000');
    return;
  }
  google.accounts.id.prompt((notification) => {
    if (notification.isNotDisplayed() || notification.isSkippedMoment()) {
      // fallback to renderButton
      google.accounts.id.renderButton(
        document.getElementById('google-signin-btn'),
        { theme: 'outline', size: 'large', width: 280 }
      );
    }
  });
});

// ── APP ENTRY ──────────────────────────────────────────────────────
function enterApp() {
  loginScreen.classList.add('hidden');
  app.classList.add('visible');
  updateProfileUI();
  renderHistory();
  input.focus();
}

function updateProfileUI() {
  if (user) {
    sidebarName.textContent = user.givenName || user.name;
    sidebarEmail.textContent = user.email;
    greetingName.textContent = user.givenName || user.name;

    if (user.picture) {
      sidebarAvatar.innerHTML = `<img src="${user.picture}" alt="${user.name}" />`;
    } else {
      sidebarAvatar.textContent = (user.name || 'U')[0].toUpperCase();
    }
  } else {
    sidebarName.textContent = 'Guest';
    sidebarEmail.textContent = 'Not signed in';
    sidebarAvatar.textContent = '👤';
    greetingName.textContent = 'friend';
  }
}

// ── FILE ATTACHMENT ────────────────────────────────────────────────
attachBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (ev) => {
    const base64Full = ev.target.result; // data:image/jpeg;base64,...
    const base64 = base64Full.split(',')[1];
    attachedImage = {
      base64,
      mimeType: file.type,
      name: file.name,
      size: file.size,
      dataUrl: base64Full
    };

    attachThumb.src = base64Full;
    attachName.textContent = file.name;
    attachSize.textContent = formatSize(file.size);
    attachPreview.classList.add('visible');
  };
  reader.readAsDataURL(file);
  fileInput.value = '';
});

removeAttachment.addEventListener('click', () => {
  attachedImage = null;
  attachPreview.classList.remove('visible');
});

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

// ── INPUT HANDLING ─────────────────────────────────────────────────
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  updateSendBtn();
});

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
});

function updateSendBtn() {
  sendBtn.disabled = !input.value.trim() && !attachedImage;
}

sendBtn.addEventListener('click', () => {
  if (!sendBtn.disabled) sendMessage();
});

// ── SEND MESSAGE ───────────────────────────────────────────────────
async function sendMessage() {
  const text = input.value.trim();
  if ((!text && !attachedImage) || isLoading) return;

  isLoading = true;
  sendBtn.disabled = true;
  input.value = '';
  input.style.height = 'auto';
  emptyState.classList.add('hidden');

  // Build message content
  let userContent;
  if (attachedImage) {
    userContent = [
      {
        type: 'image_url',
        image_url: { url: `data:${attachedImage.mimeType};base64,${attachedImage.base64}` }
      }
    ];
    if (text) userContent.push({ type: 'text', text });
  } else {
    userContent = text;
  }

  const userMsg = { role: 'user', content: userContent };
  messages.push(userMsg);

  // Render user bubble
  appendBubble('user', text, attachedImage?.dataUrl);

  // Clear attachment
  const hadAttachment = !!attachedImage;
  attachedImage = null;
  attachPreview.classList.remove('visible');

  // Show typing
  const typingEl = appendTyping();

  try {
    const response = await fetch(BACKEND_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages })
    });

    typingEl.remove();

    if (!response.ok) {
      const err = await response.json();
      appendBubble('error', err.error || 'Something went wrong.');
      messages.pop();
      return;
    }

    const data = await response.json();
    const reply = data.reply;
    const model = data.model || 'kimi-k2.5';

    messages.push({ role: 'assistant', content: reply });
    appendBubble('ai', reply, null, model);



    saveSession();
    renderHistory();

  } catch (err) {
    typingEl.remove();
    appendBubble('error', 'Network error. Check your connection.');
    messages.pop();
  } finally {
    isLoading = false;
    updateSendBtn();
  }
}

function formatText(text) {
  return text
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^### (.+)$/gm, '<strong>$1</strong>')
    .replace(/^## (.+)$/gm, '<strong>$1</strong>')
    .replace(/^- (.+)$/gm, '• $1<br/>')
    .replace(/\n\n/g, '</p><p>')
    .replace(/\n/g, '<br/>')
    .replace(/^(.+)$/, '<p>$1</p>');
}

function renderMessages() {
  // Clear all message bubbles (keep empty state)
  const bubbles = messagesEl.querySelectorAll('.message-wrapper');
  bubbles.forEach(b => b.remove());

  if (messages.length === 0) {
    emptyState.classList.remove('hidden');
  } else {
    emptyState.classList.add('hidden');
    messages.forEach(m => {
      const text = typeof m.content === 'string' ? m.content :
        m.content.filter(c => c.type === 'text').map(c => c.text).join('');
      const imgPart = Array.isArray(m.content) ? m.content.find(c => c.type === 'image_url') : null;
      appendBubble(m.role, text, imgPart?.image_url?.url);
    });
  }
}

// ── SESSIONS ───────────────────────────────────────────────────────
function saveSession() {
  if (!messages.length) return;
  const firstUserMsg = messages.find(m => m.role === 'user');
  if (!firstUserMsg) return;
  const title = typeof firstUserMsg.content === 'string'
    ? firstUserMsg.content.slice(0, 40)
    : 'Image conversation';

  const sessionId = Date.now().toString();
  const existing = chatSessions.findIndex(s => s.id === sessionId);

  if (existing > -1) {
    chatSessions[existing] = { id: sessionId, title, messages: [...messages], ts: Date.now() };
  } else {
    chatSessions.unshift({ id: sessionId, title, messages: [...messages], ts: Date.now() });
    if (chatSessions.length > 20) chatSessions = chatSessions.slice(0, 20);
  }

  localStorage.setItem('helios_sessions', JSON.stringify(chatSessions));
}

function renderHistory() {
  chatHistory.innerHTML = '';
  if (!chatSessions.length) {
    chatHistory.innerHTML = '<div style="padding:12px;font-size:12px;color:var(--text-tertiary);text-align:center;">No chats yet</div>';
    return;
  }

  chatSessions.slice(0, 15).forEach(session => {
    const item = document.createElement('div');
    item.className = 'history-item';
    item.textContent = session.title || 'Untitled';
    item.addEventListener('click', () => {
      messages = [...session.messages];
      renderMessages();
      sidebar.classList.remove('open');
      overlay.classList.remove('visible');
    });
    chatHistory.appendChild(item);
  });
}
